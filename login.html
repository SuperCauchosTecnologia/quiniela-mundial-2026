<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiniela Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .tabs { display: flex; }
        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: #f0f0f0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
            color: white;
        }
        .tab-content { padding: 40px; display: none; }
        .tab-content.active { display: block; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 50px; color: #e63946; }
        .logo h2 { margin-top: 10px; color: #1a1a2e; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-group input:focus { border-color: #e63946; outline: none; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
            color: white;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .message.error { background: #ffebee; color: #c62828; display: block; }
        .message.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .info { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #999; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-login">Iniciar Sesión</button>
            <button class="tab-btn" id="btn-register">📝 Registrarse</button>
        </div>

        <!-- Login Tab -->
        <div id="login-tab" class="tab-content active">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                <h2>Mundial 2026</h2>
                <p>Ingresa con tu cuenta</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="login-usuario" placeholder="Tu usuario" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="login-password" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
            </form>
            <div id="login-message" class="message"></div>
            <div class="info"><i class="fas fa-cloud-upload-alt"></i> Datos guardados en la nube</div>
        </div>

        <!-- Register Tab -->
        <div id="register-tab" class="tab-content">
            <div class="logo">
                <i class="fas fa-user-plus"></i>
                <h2>Crear Cuenta</h2>
                <p>Regístrate para participar</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="register-usuario" placeholder="Elige un usuario" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="register-password" placeholder="Crea una contraseña" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirmar Contraseña</label>
                    <input type="password" id="register-confirm" placeholder="Repite tu contraseña" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-circle"></i> Nombre Completo</label>
                    <input type="text" id="register-nombre" placeholder="Tu nombre completo" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Registrarse
                </button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script>
        // Elementos DOM
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');
        
        btnLogin.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            btnLogin.classList.add('active');
            btnRegister.classList.remove('active');
        });
        
        btnRegister.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            btnRegister.classList.add('active');
            btnLogin.classList.remove('active');
        });
        
        // LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('login-usuario').value.trim();
            const password = document.getElementById('login-password').value;
            const messageDiv = document.getElementById('login-message');
            const btn = e.target.querySelector('button');
            
            messageDiv.innerHTML = 'Verificando <span class="loading"></span>';
            messageDiv.className = 'message';
            btn.disabled = true;
            
            try {
                const result = await window.verificarCredenciales(usuario, password);
                console.log('Login result:', result);
                
                if (result.success) {
                    sessionStorage.setItem('usuario_actual', usuario);
                    sessionStorage.setItem('rol_usuario', result.rol);
                    sessionStorage.setItem('nombre_usuario', result.nombre);
                    
                    messageDiv.innerHTML = '✅ Redirigiendo...';
                    messageDiv.className = 'message success';
                    
                    setTimeout(() => {
                        if (result.rol === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.textContent = result.message || '❌ Usuario o contraseña incorrectos';
                    messageDiv.className = 'message error';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.textContent = '❌ Error de conexión';
                messageDiv.className = 'message error';
                btn.disabled = false;
            }
        });
        
        // REGISTRO
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('register-usuario').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const nombre = document.getElementById('register-nombre').value.trim();
            const messageDiv = document.getElementById('register-message');
            const btn = e.target.querySelector('button');
            
            if (!usuario || !password || !nombre) {
                messageDiv.textContent = '❌ Completa todos los campos';
                messageDiv.className = 'message error';
                return;
            }
            
            if (password !== confirm) {
                messageDiv.textContent = '❌ Las contraseñas no coinciden';
                messageDiv.className = 'message error';
                return;
            }
            
            if (password.length < 4) {
                messageDiv.textContent = '❌ La contraseña debe tener al menos 4 caracteres';
                messageDiv.className = 'message error';
                return;
            }
            
            messageDiv.innerHTML = 'Registrando <span class="loading"></span>';
            messageDiv.className = 'message';
            btn.disabled = true;
            
            try {
                const result = await window.registrarUsuario(usuario, password, nombre);
                console.log('Register result:', result);
                
                if (result.success) {
                    messageDiv.innerHTML = '✅ ¡Registro exitoso! Ahora puedes iniciar sesión.';
                    messageDiv.className = 'message success';
                    
                    document.getElementById('register-usuario').value = '';
                    document.getElementById('register-password').value = '';
                    document.getElementById('register-confirm').value = '';
                    document.getElementById('register-nombre').value = '';
                    
                    setTimeout(() => {
                        btnLogin.click();
                        document.getElementById('login-usuario').value = usuario;
                    }, 2000);
                } else {
                    messageDiv.textContent = result.message || '❌ Error al registrar';
                    messageDiv.className = 'message error';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Register error:', error);
                messageDiv.textContent = '❌ Error de conexión';
                messageDiv.className = 'message error';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
